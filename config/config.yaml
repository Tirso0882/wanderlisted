logging:
  level: INFO
  log_format: "%(asctime)s  %(levelname)-8s  %(name)s  %(message)s"
  datefmt: "%H:%M:%S"
  use_colors: true

  console:
    enabled: true
    level: INFO

  file:
    enabled: true
    base_path: "logs"
    level: DEBUG

# ── RAG / Chunker ────────────────────────────────────────────────────────
rag:
  chunk_size: 2000
  chunk_overlap: 200
  min_chunk_size: 200
  max_section_size: 3000
  default_tenant: "wikivoyage"
  reranker:
    enabled: true
    model: "rerank-v3.5"
    top_n: 5
  query_decomposition:
    enabled: true
    max_sub_queries: 4

# ── Routing ──────────────────────────────────────────────────────────────
routing:
  # Agents that run concurrently in the parallel dispatch phase
  parallel_agents:
    - FlightsAgent
    - DestinationAgent
    - RestaurantsAgent
    - ActivitiesAgent

  # Dependency-owned stages after initial discovery (order matters).
  # Hotels requires exact TripSkeleton stays; Transportation requires selections.
  sequential_agents:
    - HotelsAgent
    - TransportationAgent
    - BudgetAgent
    - ItineraryAgent

# ── Tool timeouts (seconds) ──────────────────────────────────────────────
timeouts:
  google_maps: 15
  directions: 15
  distance_matrix: 15
  routes: 25
  flights: 30
  hotels: 30
  weather: 10
  currency: 10

# ── HITL Gates ───────────────────────────────────────────────────────────
# Toggle human-in-the-loop interrupt gates.
# Set to true for interactive use (LangGraph Studio), false for headless (webapp).
# Override per-gate via env: HITL_SAFETY_REVIEW=false, HITL_BUDGET_REVIEW=false, etc.
hitl:
  safety_review: false
  budget_review: false
  human_review: false

# ── API ──────────────────────────────────────────────────────────────────
api:
  version: "2.0.0"
  cors_origins:
    - "http://localhost:3000"
