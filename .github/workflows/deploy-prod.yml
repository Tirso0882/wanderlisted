name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to latest main SHA)'
        required: false

env:
  AZURE_RG: wanderlisted-rg
  ACR_NAME: wanderlistedacr

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # For release tags, rebuild with prod API URL
      - name: Build & push Frontend (prod)
        if: github.event_name == 'release'
        run: |
          docker build \
            --build-arg API_URL=https://wanderlisted-api.${CONTAINER_ENV_FQDN} \
            -t ${{ env.ACR_NAME }}.azurecr.io/wanderlisted-frontend:${{ steps.tag.outputs.tag }} \
            ./frontend
          docker push ${{ env.ACR_NAME }}.azurecr.io/wanderlisted-frontend:${{ steps.tag.outputs.tag }}
        env:
          CONTAINER_ENV_FQDN: ${{ secrets.PROD_ENV_FQDN }}

      # Tag existing API image for prod (no rebuild needed)
      - name: Tag API image for prod
        if: github.event_name == 'release'
        run: |
          az acr import \
            --name ${{ env.ACR_NAME }} \
            --source ${{ env.ACR_NAME }}.azurecr.io/wanderlisted-api:${{ steps.tag.outputs.tag }} \
            --image wanderlisted-api:prod-${{ steps.tag.outputs.tag }}

      - name: Deploy infrastructure
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RG }}
          template: ./infra/main.bicep
          parameters: ./infra/parameters.prod.bicepparam
          additionalArguments: --parameters imageTag=${{ steps.tag.outputs.tag }}

      - name: Update API secrets
        run: |
          az containerapp secret set \
            --name wanderlisted-api \
            --resource-group ${{ env.AZURE_RG }} \
            --secrets \
              azure-openai-key=${{ secrets.AZURE_OPENAI_API_KEY }} \
              azure-openai-endpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }} \
              duffel-token=${{ secrets.DUFFEL_ACCESS_TOKEN }} \
              google-maps-key=${{ secrets.GOOGLE_MAPS_API_KEY }} \
              pinecone-key=${{ secrets.PINECONE_API_KEY }} \
              tavily-key=${{ secrets.TAVILY_API_KEY }} \
              hotelbeds-key=${{ secrets.HOTELBEDS_API_KEY }} \
              hotelbeds-secret=${{ secrets.HOTELBEDS_API_SECRET }}

      - name: Set API environment variables
        run: |
          az containerapp update \
            --name wanderlisted-api \
            --resource-group ${{ env.AZURE_RG }} \
            --set-env-vars \
              AZURE_OPENAI_API_KEY=secretref:azure-openai-key \
              AZURE_OPENAI_ENDPOINT=secretref:azure-openai-endpoint \
              AZURE_OPENAI_DEPLOYMENT_NAME=${{ vars.AZURE_OPENAI_DEPLOYMENT_NAME }} \
              AZURE_OPENAI_API_VERSION=${{ vars.AZURE_OPENAI_API_VERSION }} \
              DUFFEL_ACCESS_TOKEN=secretref:duffel-token \
              GOOGLE_MAPS_API_KEY=secretref:google-maps-key \
              PINECONE_API_KEY=secretref:pinecone-key \
              PINECONE_INDEX_NAME=${{ vars.PINECONE_INDEX_NAME }} \
              TAVILY_API_KEY=secretref:tavily-key \
              HOTELBEDS_API_KEY=secretref:hotelbeds-key \
              HOTELBEDS_API_SECRET=secretref:hotelbeds-secret \
              LLM_PROVIDER=azure_openai \
              ENVIRONMENT=prod
