name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 1: Lint — fast fail on code style
  # ──────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - run: ruff check src/ tests/ scripts/

  # ──────────────────────────────────────────────────────────────────
  # Job 2: Unit tests — all tests that don't call live APIs
  # ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/ -x --tb=short -q -m "not integration"
        env:
          AMADEUS_API_KEY: "test"
          AMADEUS_API_SECRET: "test"
          AMADEUS_BASE_URL: "https://test.api.amadeus.com"
          GOOGLE_MAPS_API_KEY: "test"
          OPENWEATHER_API_KEY: "test"
          PINECONE_API_KEY: "test"
          PINECONE_INDEX_NAME: "test"
          AZURE_OPENAI_API_KEY: "test"
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          AZURE_OPENAI_DEPLOYMENT_NAME: "test"
          AZURE_OPENAI_API_VERSION: "2024-12-01-preview"
          TAVILY_API_KEY: "test"

  # ──────────────────────────────────────────────────────────────────
  # Job 3: Coverage — fail if below 80%
  # ──────────────────────────────────────────────────────────────────
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest --cov=src tests/ -m "not integration" --cov-report=term-missing --cov-fail-under=80
        env:
          AMADEUS_API_KEY: "test"
          AMADEUS_API_SECRET: "test"
          AMADEUS_BASE_URL: "https://test.api.amadeus.com"
          GOOGLE_MAPS_API_KEY: "test"
          OPENWEATHER_API_KEY: "test"
          PINECONE_API_KEY: "test"
          PINECONE_INDEX_NAME: "test"
          AZURE_OPENAI_API_KEY: "test"
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          AZURE_OPENAI_DEPLOYMENT_NAME: "test"
          AZURE_OPENAI_API_VERSION: "2024-12-01-preview"
          TAVILY_API_KEY: "test"

  # ──────────────────────────────────────────────────────────────────
  # Job 4: Layer 1 evaluators — code-based, deterministic, free
  # Validates routing, budget completeness, handbook sections
  # ──────────────────────────────────────────────────────────────────
  eval-layer1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest tests/test_evaluators.py -x --tb=short -q
        env:
          AMADEUS_API_KEY: "test"
          AMADEUS_API_SECRET: "test"
          AMADEUS_BASE_URL: "https://test.api.amadeus.com"
          GOOGLE_MAPS_API_KEY: "test"
          OPENWEATHER_API_KEY: "test"
          PINECONE_API_KEY: "test"
          PINECONE_INDEX_NAME: "test"
          AZURE_OPENAI_API_KEY: "test"
          AZURE_OPENAI_ENDPOINT: "https://test.openai.azure.com"
          AZURE_OPENAI_DEPLOYMENT_NAME: "test"
          AZURE_OPENAI_API_VERSION: "2024-12-01-preview"
          TAVILY_API_KEY: "test"

  # ──────────────────────────────────────────────────────────────────
  # Job 5: Build + push Docker image (main branch only)
  # ──────────────────────────────────────────────────────────────────
  build-and-push:
    needs: [lint, test, coverage, eval-layer1]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
