# kind cluster configuration for local Wanderlisted development.
#
# The control-plane node maps host port 8000 → NodePort 30080 so that
# `curl http://localhost:8000/api/v1/health` works the same as with
# docker-compose, without needing kubectl port-forward.
#
# Create the cluster with:
#   kind create cluster --name wanderlisted --config k8s/kind-config.yaml
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080   # NodePort on the node
        hostPort: 8000          # Port on your Mac (localhost:8000)
        protocol: TCP
