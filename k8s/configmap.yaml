# Non-sensitive runtime configuration.
# Sensitive values (API keys, passwords) are in the Secret created by:
#   make k8s-secrets
apiVersion: v1
kind: ConfigMap
metadata:
  name: wanderlisted-config
  namespace: wanderlisted
data:
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  LOG_LEVEL: "INFO"
  REQUEST_TIMEOUT_SECONDS: "120"
  RATE_LIMIT_MAX: "20"
  RATE_LIMIT_WINDOW: "60"
